services:
  - type: web
    name: balowaci
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: balowaci-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: balowaci-db
    plan: free
